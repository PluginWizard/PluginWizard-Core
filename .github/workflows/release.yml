name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches project version
        shell: bash
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ]; then
            echo "version is not set in gradle.properties"
            exit 1
          fi
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gradle.properties version ($VERSION)"
            exit 1
          fi

      - name: Build and publish package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./gradlew --no-daemon :lib:clean :lib:build :lib:publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lib/build/libs/pluginwizard-core-*.jar

